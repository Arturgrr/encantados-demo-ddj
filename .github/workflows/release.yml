name: Build e Release

# A cada commit na main sai uma release nova, já com os builds prontos.
# Também dá para rodar na mão pela aba Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Necessário para a Action conseguir criar a release no repositório.
permissions:
  contents: write

env:
  GODOT_VERSION: "4.7"
  EXPORT_NAME: Encantados

jobs:
  build:
    name: Build (Windows, Linux e macOS)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar o Godot e os templates de exportação
        run: |
          set -e
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          wget -q "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"

          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

          # Os templates precisam ficar exatamente nesta pasta, com o nome da versão.
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

          godot --version

      - name: Importar os assets
        # Precisa vir antes de exportar: sem isso as imagens/áudios não entram
        # no build. Usamos --import (e não --quit-after) porque ele espera a
        # importação terminar de verdade.
        run: godot --headless --path . --import

      - name: Exportar os builds
        run: |
          set -e
          mkdir -p build/windows build/linux build/macos
          godot --headless --path . --export-release "Windows Desktop" "build/windows/${EXPORT_NAME}.exe"
          godot --headless --path . --export-release "Linux" "build/linux/${EXPORT_NAME}.x86_64"
          godot --headless --path . --export-release "macOS" "build/macos/${EXPORT_NAME}.zip"
          chmod +x "build/linux/${EXPORT_NAME}.x86_64"

      - name: Empacotar para download
        run: |
          set -e
          cd build
          zip -qr "../${EXPORT_NAME}-windows.zip" windows
          zip -qr "../${EXPORT_NAME}-linux.zip" linux
          # O export de macOS já sai zipado (o .app é uma pasta), então só renomeia.
          mv "macos/${EXPORT_NAME}.zip" "../${EXPORT_NAME}-macos.zip"
          cd ..
          ls -lh ./*.zip

      - name: Publicar a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: Encantados v0.1.${{ github.run_number }}
          body: |
            Build automático de `${{ github.sha }}`

            > ${{ github.event.head_commit.message }}

            ## Baixar e jogar
            | Sistema | Arquivo | Como rodar |
            |---|---|---|
            | Windows | `${{ env.EXPORT_NAME }}-windows.zip` | Extraia e abra `${{ env.EXPORT_NAME }}.exe` |
            | Linux | `${{ env.EXPORT_NAME }}-linux.zip` | Extraia e rode `./${{ env.EXPORT_NAME }}.x86_64` |
            | macOS | `${{ env.EXPORT_NAME }}-macos.zip` | Extraia o `.app`. Como não é assinado, na primeira vez abra com **botão direito → Abrir** |

            ## Controles
            - **Mover**: WASD, setas ou qualquer analógico do controle
            - **Bater**: J, Espaço, Enter, X, clique esquerdo ou qualquer botão do controle
            - **Tela cheia**: F11 (ou o botão de maximizar da janela)
          files: |
            ${{ env.EXPORT_NAME }}-windows.zip
            ${{ env.EXPORT_NAME }}-linux.zip
            ${{ env.EXPORT_NAME }}-macos.zip
